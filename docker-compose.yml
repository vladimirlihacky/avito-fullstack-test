services:
  database:
    image: postgres:18-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file: ./.env      
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/migrations:/migrations
    command: 
      - -path=/migrations/
      - -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:${DATABASE_PORT}/${POSTGRES_DB}?sslmode=disable
      - up
    depends_on:
      database:
        condition: service_healthy
    env_file: ./.env

  backend:
    build:
      context: ./backend
      target: run
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT}"
    env_file: ./.env
    environment: 
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:${DATABASE_PORT}/${POSTGRES_DB}?sslmode=disable"

  # client:
  #   build:
  #     context: ./client
  #     target: run
  #   ports:
  #     - "${CLIENT_PORT:-3000}:${CLIENT_PORT}"
  #   env_file: ./.env
volumes:
  postgres_data: