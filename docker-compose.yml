services:
  database:
    image: postgres:18-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file: ./.env      
    ports:
      - "${DATABASE_PORT:-5432}:5432"

  backend:
    build:
      context: ./backend
      target: run
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT}"
    env_file: ./.env

  client:
    build:
      context: ./client
      target: run
    ports:
      - "${CLIENT_PORT:-3000}:${CLIENT_PORT}"
    env_file: ./.env