services:
  database:
    image: postgres:18-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file: ./.env 
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/migrations:/migrations
    command: 
      - -path=/migrations/
      - -database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      - up
    depends_on:
      database:
        condition: service_healthy
    env_file: ./.env

  backend:
    build:
      context: ./backend
      target: run
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file: ./.env
    environment: 
      JWT_SECRET: secret
      BACKEND_PORT: "${BACKEND_PORT:-8080}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-postgres}?sslmode=disable"

volumes:
  postgres_data: