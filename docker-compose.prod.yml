services:
  database:
    image: postgres:18-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql
    command: postgres -c shared_preload_libraries=pg_stat_statements

  migrate:
    image: migrate/migrate
    volumes:
      - ./backend/migrations:/migrations
    command:
      - -path=/migrations/
      - -database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      - up
    depends_on:
      database:
        condition: service_healthy

  mcp-proxy:
    build:
      context: ./mcp
    environment:
      UPSTREAM_URL: "${UPSTREAM_URL:-https://api.deepseek.com/v1}"
      UPSTREAM_API_KEY: "${DEEPSEEK_API_KEY:-}"
      MAX_TOOL_ROUNDS: "5"
      PROXY_PORT: "8090"
    volumes:
      - .:/project:ro

  backend:
    build:
      context: ./backend
      target: run
    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PROVIDERS_CONFIG_PATH: "/providers.yml"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      JWT_SECRET: "${JWT_SECRET}"
      BACKEND_PORT: "8080"
      ENABLE_DUMMY_LOGIN: "false"
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-postgres}?sslmode=disable"

  frontend:
    build:
      context: ./client
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: "/api"

volumes:
  postgres_data:
