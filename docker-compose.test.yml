services:
  test-db:
    image: postgres:18-alpine3.22
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s 
      retries: 10
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres

  backend-test:
    build:
      context: ./backend
      target: test 
    environment:
      - TEST_DATABASE_URL=postgres://postgres:password@test-db:5432/postgres?sslmode=disable
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        go test ./internal/... -v -coverprofile=coverage-unit.out &&
        go test ./tests/e2e/... -v -timeout 30s -coverprofile=coverage-e2e.out &&
        go tool cover -func=coverage-unit.out &&
        go tool cover -func=coverage-e2e.out
      "