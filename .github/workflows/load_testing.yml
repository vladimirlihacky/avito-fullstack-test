name: Load Testing

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docker-compose
        run: docker compose up --build -d
      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/_info
      - name: Teardown
        run: docker compose down -v
  
  load-test:
    runs-on: ubuntu-latest
    needs: [build] 
    
    steps:
      - uses: actions/checkout@v6

      - name: Start Infrastructure
        run: docker compose up --build -d

      - name: Wait for Backend Readiness
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..10}; do
            curl -s -f http://localhost:8080/_info && break
            sleep 3
          done

      - name: Run k6 Load Test
        run: |
          NETWORK=$(docker network ls --format '{{.Name}}' | grep default | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v ${{ github.workspace }}/backend/tests/load:/scripts \
            -e BASE_URL=http://backend:8080 \
            grafana/k6 run /scripts/test.js \
            -u 10 --stage 10s:10 --stage 20s:20 --stage 10s:0

      - name: Teardown
        if: always() 
        run: docker compose down -v