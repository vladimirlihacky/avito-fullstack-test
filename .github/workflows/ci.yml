# .github/workflows/ci.yml
name: CI

on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18-alpine3.22
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.1
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        working-directory: backend
        run: go test ./internal/... -v -coverprofile=coverage-unit.out

      - name: Run e2e tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://postgres:password@localhost:5432/postgres?sslmode=disable
        run: go test ./tests/e2e/... -v -timeout 120s -coverprofile=coverage-e2e.out

      - name: Coverage report
        working-directory: backend
        run: |
          go tool cover -func=coverage-unit.out
          go tool cover -func=coverage-e2e.out

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.1
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: client
        run: bun install
      - name: Run tests
        working-directory: client
        run: bun test
      - name: Type check
        working-directory: client
        run: bunx tsc --noEmit

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: client
        run: bun install
      - name: Lint
        working-directory: client
        run: bun run lint
      - name: Format check
        working-directory: client
        run: bun run check

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build docker-compose
        run: docker compose up --build -d
      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/_info
      - name: Teardown
        run: docker compose down -v
  
  load-test:
    runs-on: ubuntu-latest
    needs: [build] 
    
    steps:
      - uses: actions/checkout@v6

      - name: Start Infrastructure
        run: docker compose up --build -d

      - name: Wait for Backend Readiness
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..10}; do
            curl -s -f http://localhost:8080/_info && break
            sleep 3
          done

      - name: Run k6 Load Test
        run: |
          NETWORK=$(docker network ls --format '{{.Name}}' | grep default | head -1)
          docker run --rm \
            --network "$NETWORK" \
            -v ${{ github.workspace }}/backend/tests/load:/scripts \
            -e BASE_URL=http://backend:8080 \
            grafana/k6 run /scripts/test.js \
            -u 10 --stage 10s:10 --stage 20s:20 --stage 10s:0

      - name: Teardown
        if: always() 
        run: docker compose down -v