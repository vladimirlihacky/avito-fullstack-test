# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:18-alpine3.22
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        working-directory: backend
        run: go test ./internal/... -v -coverprofile=coverage-unit.out

      - name: Run e2e tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgres://postgres:password@localhost:5432/postgres?sslmode=disable
        run: go test ./tests/e2e/... -v -timeout 120s -coverprofile=coverage-e2e.out

      - name: Coverage report
        working-directory: backend
        run: |
          go tool cover -func=coverage-unit.out
          go tool cover -func=coverage-e2e.out

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v4
        with:
          working-directory: backend

  build:
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build docker-compose
        run: docker compose up --build -d
      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:8080/_info
      - name: Teardown
        run: docker-compose down -v